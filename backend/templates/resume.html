<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @page {
      size: A4;
      margin: 10mm 14mm 10mm 14mm;
    }
    body { margin: 0; }
  </style>
</head>

<body class="m-0 bg-white font-sans text-[12.5px] text-slate-900  ">
  <div class="flex min-h-[calc(297mm-20mm)] w-full flex-col justify-start ">

  <!-- HEADER -->
  <div class="flex items-stretch justify-between gap-3 border-b border-transparent mt-10 pb-1.5">

    <!-- LEFT -->
    <div class="flex min-w-0 flex-1 items-start gap-3">
      {{heroBlock}}
      <div class=" flex flex-col gap-2 ">
        <h1 class="m-0 break-words text-[30px] leading-[1.1] font-extrabold tracking-[0.02em]">{{fullName}}</h1>
        <p class="mt-1 break-words text-base font-semibold text-slate-900">{{jobTitle}}</p>
        <p class="mt-1.5 break-words text-[11.5px] leading-[1.35] text-slate-700">{{summary}}</p>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="flex w-[248px] min-w-[210px] max-w-[248px] flex-col items-start gap-3 pt-0.5 text-left text-[13px] mt-5 text-slate-900">
      {{contactLines}}
    </div>

  </div>

  <!-- MAIN GRID -->
  <div class="mt-1 grid flex-1 grid-cols-[63.5%_36.5%] gap-2.5">

    <!-- LEFT SIDE -->
    <div class="flex flex-col gap-20 border-r border-slate-800 pr-3">

      <!-- EDUCATION -->
      <div class="mb-2.5 break-inside-avoid">
        <h2 class="mb-1.5 border-b-2 border-slate-900 pb-0.5 text-[12.5px] font-extrabold tracking-[0.16em] text-slate-900">EDUCATION</h2>
        {{education}}
      </div>

      <!-- EXPERIENCE -->
      <div class="mb-2.5 break-inside-avoid">
        <h2 class="mb-1.5 border-b-2 border-slate-900 pb-0.5 text-[12.5px] font-extrabold tracking-[0.16em] text-slate-900">
          INTERNSHIP / EXPERIENCE
        </h2>
        {{experience}}
      </div>

      <!-- PROJECTS -->
      <div class="mb-2.5 break-inside-avoid">
        <h2 class="mb-1.5 border-b-2 border-slate-900 pb-0.5 text-[12.5px] font-extrabold tracking-[0.16em] text-slate-900">PROJECTS</h2>
        {{projects}}
      </div>
    <!-- REFERRAL -->
      <div class="mb-2.5 break-inside-avoid">
        <h2 class="mb-1.5 border-b-2 border-slate-900 pb-0.5 text-[12.5px] font-extrabold tracking-[0.16em] text-slate-900">
          REFERRAL
        </h2>
        {{referral}}
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="flex flex-col gap-30">

      <!-- CERTIFICATION -->
      <div class="mb-2.5 break-inside-avoid">
        <h2 class="mb-1.5 border-b-2 border-slate-900 pb-0.5 text-[12.5px] font-extrabold tracking-[0.16em] text-slate-900">
          CERTIFICATION
        </h2>
        {{certifications}}
      </div>

      <!-- PREFERENCES -->
      <div class="mb-2.5 break-inside-avoid">
        <h2 class="mb-1.5 border-b-2 border-slate-900 pb-0.5 text-[12.5px] font-extrabold tracking-[0.16em] text-slate-900">PREFERENCES</h2>
        {{preferences}}
      </div>

      <!-- SKILLS -->
      <div class="mb-2.5 break-inside-avoid">
        <h2 class="mb-1.5 border-b-2 border-slate-900 pb-0.5 text-[12.5px] font-extrabold tracking-[0.16em] text-slate-900">SKILL</h2>
        {{skills}}
      </div>

  

    </div>

  </div>

  <!-- FOOTER -->
   <div class="flex justify-end items-center  text-lg  mt-2 gap-2 ">
    <span>Powered By</span>
    <img class="h-28 pb-3"
      src="https://www.recruitkr.com/assets/logo-wF9xbWSr.png" />
  </div>

</div>
</body>
</html>
