<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Resume</title>
    <style>
      @page {
        size: A4;
        margin: 16mm 18mm;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #111827;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          'Apple Color Emoji', 'Segoe UI Emoji';
        font-size: 12px;
        line-height: 1.45;
      }

      .header {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
        padding-bottom: 10px;
        border-bottom: 1px solid #e5e7eb;
      }

      .header-left {
        flex: 1 1 auto;
        min-width: 0;
      }

      .name {
        font-size: 24px;
        font-weight: 800;
        line-height: 1.15;
        word-break: break-word;
      }

      .title {
        margin-top: 4px;
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        word-break: break-word;
      }

      .summary {
        margin-top: 6px;
        color: #4b5563;
        word-break: break-word;
      }

      .header-right {
        flex: 0 0 230px;
        max-width: 230px;
        color: #111827;
        word-break: break-word;
      }

      .contact-line {
        margin: 0 0 3px 0;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 18px;
        margin-top: 14px;
      }

      .section {
        margin-bottom: 14px;
        break-inside: avoid;
      }

      .section-title {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.06em;
        color: #111827;
        padding-bottom: 4px;
        border-bottom: 2px solid #9ca3af;
        margin: 0 0 8px 0;
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      li {
        margin: 0 0 6px 0;
      }

      .kv {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 6px 10px;
      }

      .k {
        color: #6b7280;
      }

      .v {
        color: #111827;
        word-break: break-word;
      }

      .muted {
        color: #6b7280;
      }

      .footer {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 10px;
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="name">{{fullName}}</div>
        <div class="title">{{jobTitle}}</div>
        <div class="summary">{{summary}}</div>
      </div>
      <div class="header-right">
        {{contactLines}}
      </div>
    </div>

    <div class="grid">
      <div>
        {{leftSections}}
      </div>
      <div>
        {{rightSections}}
      </div>
    </div>


    <div class="footer flex justify-end items-center gap-3 text-xs mt-4 border-t pt-2">
  
  <div class="flex items-center gap-2">
    <span class="text-gray-700 text-sm font-medium">
      Generated by RecruitKr
    </span>

    <img 
      src="https://www.recruitkr.com/assets/logo-wF9xbWSr.png"
      alt="RecruitKr Logo"
      class="h-10 w-auto object-contain"
    />
  </div>

  <span class="text-gray-400 text-xs ml-4">
    {{generatedAt}}
  </span>

</div>
  </body>
</html>
