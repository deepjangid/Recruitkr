<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>

  <style>
    @page {
      size: A4;
      margin: 16mm 18mm;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      font-size: 12.5px;
      color: #111827;
    }

    .page {
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 14px;
      gap: 16px;
    }

    .header-left {
      display: flex;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
      align-items: flex-start;
    }

    .avatar-only {
      width: 78px;
      height: 78px;
      border-radius: 10px;
      overflow: hidden;
      flex: 0 0 auto;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }

    .avatar-only img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin: 0;
      line-height: 1.1;
      word-break: break-word;
    }

    .title {
      margin: 4px 0 0 0;
      font-size: 15px;
      color: #111827;
      font-weight: 600;
      word-break: break-word;
    }

    .summary {
      margin: 6px 0 0 0;
      color: #374151;
      font-size: 12px;
      word-break: break-word;
    }

    .contact {
      text-align: right;
      font-size: 13px;
      color: #111827;
      min-width: 220px;
      max-width: 260px;
      word-break: break-word;
    }

    .contact .contact-line {
      margin: 0 0 6px 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .contact svg {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      color: #111827;
    }

    .grid {
      display: grid;
      grid-template-columns: 62% 38%;
      gap: 18px;
      margin-top: 14px;
    }

    .left {
      padding-right: 16px;
      border-right: 2px solid #111827;
    }

    .section {
      margin-bottom: 18px;
      break-inside: avoid;
    }

    .section-title {
      font-weight: 800;
      color: #111827;
      border-bottom: 2px solid #111827;
      padding-bottom: 4px;
      margin: 0 0 8px 0;
      letter-spacing: 0.16em;
      font-size: 11px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin: 0 0 6px 0;
    }

    .muted {
      color: #6b7280;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 10px;
      padding-top: 4px;
      font-size: 10px;
      color: #111827;
      gap: 8px;
    }
  </style>
</head>

<body>
  <div class="page">

  <!-- HEADER -->
  <div class="header">

    <!-- LEFT -->
    <div class="header-left">
      {{heroBlock}}
      <div>
        <h1 class="name">{{fullName}}</h1>
        <p class="title">{{jobTitle}}</p>
        <p class="summary">{{summary}}</p>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="contact">
      {{contactLines}}
    </div>

  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- LEFT SIDE -->
    <div class="left">

      <!-- EDUCATION -->
      <div class="section">
        <h2 class="section-title">EDUCATION</h2>
        {{education}}
      </div>

      <!-- EXPERIENCE -->
      <div class="section">
        <h2 class="section-title">
          INTERNSHIP / EXPERIENCE
        </h2>
        {{experience}}
      </div>

      <!-- PROJECTS -->
      <div class="section">
        <h2 class="section-title">PROJECTS</h2>
        {{projects}}
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div>

      <!-- CERTIFICATION -->
      <div class="section">
        <h2 class="section-title">
          CERTIFICATION
        </h2>
        {{certifications}}
      </div>

      <!-- SKILLS -->
      <div class="section">
        <h2 class="section-title">SKILL</h2>
        {{skills}}
      </div>

      <!-- REFERRAL -->
      <div class="section">
        <h2 class="section-title">
          REFERRAL
        </h2>
        {{referral}}
      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>Powered By</span>
    <span style="font-weight: 700;">RecruitKr</span>
  </div>

  </div>
</body>
</html>
