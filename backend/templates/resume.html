<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @page {
      size: A4;
      margin: 14mm 16mm;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      font-size: 12.5px;
      color: #111827;
      background: #fff;
    }

    .page {
      width: 100%;
      min-height: calc(297mm - 32mm);
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 10px;
      gap: 16px;
    }

    .header-left {
      display: flex;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
      align-items: flex-start;
      
    }

    .avatar-only {
      width: 78px;
      height: 78px;
      border-radius: 10px;
      overflow: hidden;
      flex: 0 0 auto;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }

    .avatar-only img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin: 0;
      line-height: 1.1;
      word-break: break-word;
    }

    .title {
      margin: 4px 0 0 0;
      font-size: 16px;
      color: #111827;
      font-weight: 600;
      word-break: break-word;
      
    }

    .summary {
      margin: 5px 0 0 0;
      color: #374151;
      font-size: 11.5px;
      word-break: break-word;
    }

    .contact {
      text-align: right;
      font-size: 13px;
      color: #111827;
      min-width: 220px;
      max-width: 260px;
      word-break: break-word;
    }

    .contact .contact-line {
      margin: 0 0 6px 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .contact svg {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      color: #111827;
    }

    .grid {
      display: grid;
      grid-template-columns: 62% 38%;
      gap: 16px;
      margin-top: 10px;
      flex: 1 1 auto;
    }

    .left {
      padding-right: 16px;
      border-right: 2px solid #111827;
      
    }

    .section {
      margin-bottom: 14px;
      break-inside: avoid;
    }

    .section-title {
      font-weight: 800;
      color: #111827;
      border-bottom: 2px solid #111827;
      padding-bottom: 3px;
      margin: 0 0 6px 0;
      letter-spacing: 0.16em;
      font-size: 12.5px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin: 0 0 4px 0;
    }

    .muted {
      color: #6b7280;
    }

    .kv-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .kv-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .kv-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #6b7280;
      text-transform: uppercase;
    }

    .kv-value {
      font-size: 12px;
      color: #111827;
      word-break: break-word;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: auto;
      padding-top: 4px;
      font-size: 10px;
      color: #111827;
      gap: 8px;
    }

    .footer-logo {
      height: 22px;
      width: auto;
    }
  </style>
</head>

<body>
  <div class="page">

  <!-- HEADER -->
  <div class="header">

    <!-- LEFT -->
    <div class="header-left">
      {{heroBlock}}
      <div>
        <h1 class="name">{{fullName}}</h1>
        <p class="title">{{jobTitle}}</p>
        <p class="summary">{{summary}}</p>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="contact">
      {{contactLines}}
    </div>

  </div>

  <!-- MAIN GRID -->
  <div class="grid ">

    <!-- LEFT SIDE -->
    <div class="left flex flex-col gap-25">

      <!-- EDUCATION -->
      <div class="section">
        <h2 class="section-title">EDUCATION</h2>
        {{education}}
      </div>

      <!-- EXPERIENCE -->
      <div class="section">
        <h2 class="section-title">
          INTERNSHIP / EXPERIENCE
        </h2>
        {{experience}}
      </div>

      <!-- PROJECTS -->
      <div class="section">
        <h2 class="section-title">PROJECTS</h2>
        {{projects}}
      </div>
    <!-- REFERRAL -->
      <div class="section">
        <h2 class="section-title">
          REFERRAL
        </h2>
        {{referral}}
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="flex flex-col gap-25">

      <!-- CERTIFICATION -->
      <div class="section">
        <h2 class="section-title">
          CERTIFICATION
        </h2>
        {{certifications}}
      </div>

      <!-- PREFERENCES -->
      <div class="section">
        <h2 class="section-title">PREFERENCES</h2>
        {{preferences}}
      </div>

      <!-- SKILLS -->
      <div class="section">
        <h2 class="section-title">SKILL</h2>
        {{skills}}
      </div>

  

    </div>

  </div>

  <!-- FOOTER -->
  <div class="flex justify-end items-center  text-lg  mt-2 gap-2 ">
    <span>Powered By</span>
    <img class="h-28 pb-3"
      src="https://www.recruitkr.com/assets/logo-wF9xbWSr.png" />
  </div>

</div>
</div>
</body>
</html>
